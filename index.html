<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PASTEL chat</title>
    <style>
        /* 테마별 전역 변수 */
        :root {
            --bg-color: #FFFFFF;
            --text-color: #2C3E50;
            --border-color: #E6E6E6;
            --border-dark-gray: #B0B0B0; /* 진한 회색 수직 실선 및 툴바 점선 */
            --accent-color: #BCD0D8;
            --card-bg: #F9F9F9;
            --pastel-purple-bg: #F3EBF7;
            --pastel-purple-text: #53118D;
            --active-purple: #D5C2DE;
            --gray-text: #888888;
            --danger-color: #FF4433;
            --textarea-bg: #FAFAFA; /* 연한 회색 입력창 배경색 */
            --send-btn-normal: #D5C2DE; /* 연보라 전송버튼 */
            --send-btn-active: #888888;
        }

        body[data-theme="dark"] {
            --bg-color: #242321;
            --text-color: #F0EFEB;
            --border-color: #42413D;
            --border-dark-gray: #6A6A67;
            --card-bg: #1A1918;
            --pastel-purple-bg: #382D42;
            --pastel-purple-text: #D5C2DE;
            --active-purple: #614F73;
            --gray-text: #A0A0A0;
            --textarea-bg: #1E1E1C;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* 1. 보안 진입 페이지 */
        #login-screen {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            width: 100%; height: 100%; box-sizing: border-box; padding: 20px;
        }

        .search-box {
            display: flex; align-items: center; width: 100%; max-width: 500px;
            border: 1px solid var(--border-color); border-radius: 24px;
            padding: 6px 14px; box-sizing: border-box;
            background: transparent; transition: 0.2s;
        }

        .search-box:focus-within {
            box-shadow: 0 1px 6px rgba(32,33,36,0.2);
            border-color: transparent;
        }

        .search-box input {
            flex: 1; border: none; outline: none; background: transparent;
            color: var(--text-color); font-size: 16px; padding: 8px 0;
        }

        .search-box button {
            background: none; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            padding: 0 8px;
        }

        /* 2. 메인 플레이 화면 */
        #app-screen {
            display: none; width: 100%; height: 100%; flex-direction: column; position: relative;
        }

        /* 1단: 최상단 PASTEL chat 고정 전용 헤더 */
        .app-header {
            height: 48px; border-bottom: none;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; box-sizing: border-box;
            background-color: var(--bg-color); z-index: 10;
        }

        .app-logo {
            font-size: 24px; font-weight: 800; letter-spacing: 0.5px;
            position: absolute; left: 50%; transform: translateX(-50%);
            cursor: pointer; user-select: none;
        }

        /* 가로 세줄 삼지창 버튼 */
        .menu-trigger {
            background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-color);
            padding: 0; margin-right: 12px; display: flex; align-items: center;
        }

        /* 왼쪽 사이드바 메뉴 */
        .sidebar {
            position: absolute; top: 0; left: -280px; width: 280px; height: 100%;
            background-color: var(--bg-color); border-right: 1px solid var(--border-color);
            z-index: 30; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: 2px 0 12px rgba(0,0,0,0.1);
        }

        .sidebar.open { left: 0; }

        /* 우측 제어 서랍 메뉴 (3단 헤더 아래 134px 격리 배치 및 터치 감수 z-index 교정 완료) */
        .right-drawer {
            position: absolute; top: 118px; right: -280px; width: 280px; height: calc(100% - 118px);
            background-color: var(--bg-color); border-left: 1px solid var(--border-color);
            z-index: 30; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: -2px 0 12px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .right-drawer.open { right: 0; }

        /* 서랍 메뉴 헤더 축소 */
        .right-drawer-header {
            height: 38px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; padding: 0 16px; justify-content: space-between;
            background-color: var(--bg-color);
        }

        .sidebar-header {
            height: 48px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; padding: 0 16px; justify-content: space-between;
        }

        .sidebar-content {
            flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px;
        }

        .menu-item {
            padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold;
            transition: 0.2s; display: flex; align-items: center;
        }

        .menu-item:hover { background-color: var(--card-bg); }
        
        .sidebar-section-title-row {
            display: flex; justify-content: space-between; align-items: center; margin: 16px 0 8px 4px;
        }
        .sidebar-section-title { font-size: 11px; color: var(--gray-text); font-weight: bold; }
        .sidebar-action-btn { background: none; border: none; font-size: 10px; color: var(--gray-text); cursor: pointer; }

        /* 에피소드 리스트 아이템 */
        .episode-row {
            display: flex; align-items: center; gap: 6px; width: 100%; box-sizing: border-box;
        }
        .episode-item {
            flex: 1; padding: 8px 12px; font-size: 13px; color: var(--text-color); cursor: pointer;
            border-radius: 6px; transition: 0.2s; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .episode-item:hover { background-color: var(--card-bg); }
        .ep-edit-btn { background: none; border: none; color: var(--gray-text); cursor: pointer; padding: 4px; font-size: 11px; }

        /* 암전 오버레이 (118px 아래에만 어둡게 내리기) */
        .overlay {
            position: absolute; inset: 0; background-color: rgba(0,0,0,0.4);
            z-index: 20; display: none;
        }
        .overlay.active { display: block; }
        
        #right-drawer-overlay {
            top: 118px; height: calc(100% - 118px);
        }

        /* 메인 컨텐츠 영역 */
        .main-container {
            flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        /* 패널 레이아웃 */
        .panel-container {
            flex: 1; overflow-y: auto; padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 16px;
        }

        /* 에디터 상단 헤더 스티키(Sticky) 고정 */
        #story-editor-panel {
            overflow-y: auto; display: none; flex-direction: column; position: relative;
        }

        #story-editor-panel .panel-header {
            position: sticky; top: 0; background-color: var(--bg-color); z-index: 20;
            padding: 12px 0; border-bottom: 1px solid var(--border-color);
        }

        .panel-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
        }

        .panel-title { font-size: 18px; font-weight: bold; }

        /* 버튼 양식 */
        .btn-gray-outline {
            border: 1px solid var(--border-color); background-color: var(--card-bg);
            color: var(--text-color); padding: 8px 16px; border-radius: 8px;
            font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-gray-outline:hover { filter: brightness(0.95); }

        .btn-play-theme {
            border: 1px solid var(--border-color); background-color: var(--active-purple);
            color: var(--text-color); padding: 8px 16px; border-radius: 8px;
            font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-play-theme:hover { filter: brightness(0.93); }

        /* 대형 설정 박스 */
        .boxed-card {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 16px; display: flex; flex-direction: column;
            gap: 12px; box-sizing: border-box;
        }

        /* 스토리 카드 디자인 */
        .story-row-wrap { display: flex; align-items: center; gap: 8px; width: 100%; }
        .story-card {
            flex: 1; background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 16px; display: flex; justify-content: space-between;
            align-items: center; box-sizing: border-box; transition: 0.2s; cursor: pointer;
        }
        .story-card:hover { border-color: var(--accent-color); }
        .story-info { display: flex; flex-direction: column; gap: 4px; text-align: left; }
        .story-name { font-size: 14px; font-weight: bold; }
        .story-intro { font-size: 11px; color: var(--gray-text); }

        /* 격자형 소제목 디자인 */
        .card-subheader {
            font-size: 13px; font-weight: bold; color: #74A1C0;
            padding-bottom: 6px; border-bottom: 1px dashed var(--border-color);
            text-align: left; margin-bottom: 4px;
        }

        /* 폼 입력 필드 */
        .input-group { display: flex; flex-direction: column; gap: 6px; text-align: left; }
        .input-group label { font-size: 11px; font-weight: bold; color: var(--gray-text); }
        .input-group input, .input-group textarea {
            border: 1px solid var(--border-color); border-radius: 8px;
            background: var(--bg-color); color: var(--text-color); font-size: 13px;
            padding: 10px; box-sizing: border-box; outline: none; font-family: inherit;
        }
        .input-group textarea { resize: none; }
        .char-counter { font-size: 10px; color: var(--gray-text); text-align: right; margin-top: -6px; }
        .char-counter.error { color: var(--danger-color); font-weight: bold; }

        /* 대화방 내부 레이아웃 */
        .chat-room-container {
            display: none; flex-direction: column; width: 100%; height: 100%; overflow: hidden;
        }

        /* 2단: 스토리 제목 서브 헤더 (왼쪽 정렬, 크기 상향 20px, 가로 구분선 완전 제거) */
        .chat-sub-header {
            height: 48px; border-bottom: none;
            display: flex; align-items: center; justify-content: space-between;
            font-size: 20px; font-weight: bold; color: var(--text-color);
            background-color: var(--bg-color);
            padding: 0 36px; box-sizing: border-box;
        }

        .chat-sub-title-text {
            cursor: pointer; text-align: left; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .chat-sub-title-text:hover { text-decoration: underline; }

        /* 3단: 비용 및 라디오존데 헤더 (수직 간격 70% 압축 보정, 가로구분 실선 추가) */
        .chat-info-header {
            height: 32px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 36px; box-sizing: border-box; font-size: 13px; color: var(--gray-text);
            background-color: var(--bg-color); margin-top: -12px;
        }

        /* 대화창 내부 넓은 마진 레이아웃 (36px 패딩) */
        .chat-container {
            flex: 1; overflow-y: auto; box-sizing: border-box; padding: 20px 36px;
        }

        /* 대화 카드 및 메시지 */
        .msg-card {
            padding: 18px 0; border-bottom: 1px solid var(--border-color);
            line-height: 1.6; font-size: 15px; word-break: break-all; text-align: left;
        }

        .msg-card .narration { color: var(--gray-text); }
        .msg-card .bold-txt { font-weight: bold; }
        .msg-card .code-inline {
            background-color: var(--pastel-purple-bg); color: var(--pastel-purple-text);
            font-weight: bold; border-radius: 4px; padding: 2px 6px; margin: 0 2px;
        }
        /* 코드 블록 (둥근 모서리, 회색 테두리, 보송한 분홍빛 배경, 전체 볼드 해제) */
        .msg-card pre {
            background-color: #fff5ff; border: 1px solid var(--border-color);
            border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0;
            box-sizing: border-box;
        }
        .msg-card pre code { font-family: monospace; color: var(--text-color); }
        body[data-theme="dark"] .msg-card pre { background-color: #382B3A; }

        /* 인용구 스타일 (굵은 회색 세로 실선, 인용구 연속 정밀 연동) */
        .msg-card .quote-block {
            border-left: 4px solid var(--border-dark-gray); padding-left: 12px;
            margin: 0 0 0 8px; color: var(--text-color); display: block;
        }
        .msg-card .quote-block:first-of-type { margin-top: 8px; }
        .msg-card .quote-block:last-of-type { margin-bottom: 8px; }

        /* 하단 입력 영역 (대화창과 구분 가로 실선 완전 삭제, 와이드 마진 적용) */
        .footer-control {
            border-top: none; padding: 8px 36px 16px 36px;
            display: flex; flex-direction: column; gap: 8px; box-sizing: border-box;
            background-color: var(--bg-color);
        }

        .input-toolbar {
            display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--gray-text);
        }

        /* 단축기 원형 배경 단추 (연회색 아웃라인 동그라미) */
        .tool-btn {
            background-color: transparent; border: 1px solid var(--border-color); color: var(--text-color); cursor: pointer;
            width: 24px; height: 24px; border-radius: 50%; font-size: 11px; transition: 0.2s;
            display: inline-flex; align-items: center; justify-content: center; padding: 0;
            box-sizing: border-box;
        }

        .tool-btn:hover { background-color: var(--card-bg); border-color: var(--border-dark-gray); }
        .vertical-divider { width: 1px; height: 14px; border-left: 1px dashed var(--border-dark-gray); margin: 0 2px; }

        /* 5줄 세로 크기 고정 입력창 및 원형 전송 버튼 빌트인 탑재 (relative 기반) */
        .input-area { display: flex; width: 100%; position: relative; box-sizing: border-box; }
        .input-area textarea {
            flex: 1; height: 116px; max-height: 116px; border: 1px solid var(--border-color);
            border-radius: 12px; background-color: var(--textarea-bg); color: var(--text-color);
            padding: 16px 54px 16px 16px; box-sizing: border-box; resize: none; font-size: 15px; outline: none;
            line-height: 20px; overflow-y: auto;
        }

        /* 빌트인 연보라 70% 축소 원형 버튼 (배경색 #D5C2DE 교정 완료) */
        .hold-btn {
            width: 32px; height: 32px; border-radius: 50%; border: none;
            background-color: var(--send-btn-normal); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            position: absolute; right: 10px; bottom: 10px;
            box-sizing: border-box; padding: 0; transition: background-color 0.2s;
        }

        /* 퀵 모달 팝업 */
        .global-popup-overlay {
            position: absolute; inset: 0; background-color: rgba(0,0,0,0.5);
            z-index: 50; display: none; align-items: center; justify-content: center; padding: 16px;
        }
        .global-popup-overlay.active { display: flex; }

        .global-popup-modal {
            background-color: var(--bg-color); border: 1px solid var(--border-color);
            border-radius: 16px; width: 100%; max-width: 500px; padding: 24px;
            box-sizing: border-box; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; gap: 14px;
        }

        /* 단축어 카드 전역 폼 가독성 보정 (마진 확대 및 15px 폰트 상향 완료) */
        .sc-editor-group { display: flex; flex-direction: column; gap: 14px; width: 100%; text-align: left; }
        .sc-input {
            width: 100%; border: 1px solid var(--border-color); border-radius: 8px;
            background-color: var(--bg-color); color: var(--text-color); font-size: 15px !important;
            padding: 10px; box-sizing: border-box; outline: none; font-family: inherit;
        }
        .sc-textarea {
            width: 100%; height: 100px; border: 1px solid var(--border-color); border-radius: 8px;
            background-color: var(--bg-color); color: var(--text-color); font-size: 15px !important;
            padding: 10px; box-sizing: border-box; outline: none; font-family: inherit; resize: none;
        }
        .sc-save-btn {
            background: transparent; border: none; color: var(--text-color); cursor: pointer;
            display: flex; align-items: center; justify-content: center; padding: 6px; transition: 0.2s;
        }
        .sc-save-btn:hover { color: var(--active-purple); }
    </style>
</head>
<body>

    <!-- 1. 진입 검증 스크린 -->
    <div id="login-screen">
        <div class="search-box">
            <input type="password" id="pw-input" placeholder="" onkeydown="if(event.key === 'Enter') verifyPass()">
            <button onclick="verifyPass()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="var(--text-color)" viewBox="0 0 24 24" width="24px" height="24px"><path fill-rule="evenodd" d="M10.26 2.01a8.25 8.25 0 1 0 5.24 14.62l5.31 5.32 1.14-1.14-5.32-5.3A8.25 8.25 0 0 0 10.26 2m-6.65 8.25a6.65 6.65 0 1 1 13.3 0 6.65 6.65 0 0 1-13.3 0" clip-rule="evenodd"></path></svg>
            </button>
        </div>
    </div>

    <!-- 2. 플레이 웹 메인 인터페이스 -->
    <div id="app-screen">
        <!-- 1단: 최상단 고정 헤더 -->
        <div class="app-header">
            <button class="menu-trigger" onclick="toggleSidebar()">☰</button>
            <div class="app-logo" onclick="showPanel('story-panel')">PASTEL chat</div>
            <div style="width: 24px;"></div>
        </div>

        <!-- 왼쪽 사이드바 메뉴 -->
        <div class="sidebar" id="app-sidebar">
            <div class="sidebar-header">
                <span style="font-weight: bold; font-size: 14px;">메뉴</span>
                <button class="menu-trigger" onclick="toggleSidebar()">✕</button>
            </div>
            <div class="sidebar-content">
                <div class="menu-item" onclick="showPanel('story-panel')">🎬 스토리</div>
                <div class="menu-item" onclick="showPanel('shortcut-panel')">⌨️ 단축어</div>
                <div class="menu-item" onclick="showPanel('cost-panel')">💳 비용 분석</div>
                
                <!-- 에피소드 관리 및 이름 수정 -->
                <div class="sidebar-section-title-row">
                    <span class="sidebar-section-title">에피소드</span>
                    <button class="sidebar-action-btn" onclick="toggleEpisodeDeleteMode()">삭제</button>
                </div>
                <div id="episode-list" style="display:flex; flex-direction:column; gap:4px;">
                    <!-- 대화방 목록 연동 영역 -->
                </div>
            </div>
        </div>
        <div class="overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- 우측 제어 서랍 메뉴 (3단 헤더 아래 134px 격리 배치 완벽 구현) -->
        <div class="right-drawer" id="app-right-drawer">
            <div class="right-drawer-header">
                <span style="font-weight: bold; font-size: 13px;">플레이 제어</span>
                <button class="menu-trigger" onclick="toggleRightDrawer()" style="margin-right:0;">✕</button>
            </div>
            <div class="sidebar-content">
                <!-- 아코디언 접이식 헤더 -->
                <div class="sidebar-section-title" id="api-toggle-header" onclick="toggleApiSettingsCollapse()" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center; width:100%;">
                    <span>API 설정</span>
                    <span id="api-toggle-arrow">▶</span>
                </div>
                <!-- 접이식 설정 카드 박스 -->
                <div class="boxed-card" id="api-settings-card" style="padding:12px; gap:8px; display:none;">
                    <div class="tab-bar" style="margin-bottom:8px; justify-content:flex-start; gap:12px; border-bottom:none;">
                        <div class="tabs" style="gap:8px;">
                            <button class="tab active" id="api-tab-gemini" onclick="switchApiTab('gemini')">Gemini</button>
                            <button class="tab" id="api-tab-firebase" onclick="switchApiTab('firebase')">Firebase</button>
                        </div>
                    </div>
                    <!-- 탭 1: 제미나이 키 -->
                    <div class="api-tab-content" id="api-content-gemini" style="display:block;">
                        <div class="input-group">
                            <label>Google Gemini API Key</label>
                            <input type="password" id="api-key-input" placeholder="AIzaSy..." style="font-size:12px; padding:6px;" onchange="saveApiCredentials()">
                        </div>
                    </div>
                    <!-- 탭 2: 파이어베이스 스크립트 -->
                    <div class="api-tab-content" id="api-content-firebase" style="display:none;">
                        <div class="input-group">
                            <label>Firebase Config Script</label>

        <div class="popup-modal" style="max-width: 320px; padding: 16px;">

            </div>

    <!-- SDK 및 비즈니스 스크립트 로드 -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        // [여기에 본인의 파이어베이스 설정 값을 붙여넣으십시오]
        const firebaseConfig = {
            apiKey: "AIzaSyCyYErhmrNCBZAdrsj4u_kRjUyBx0kaszM",
            authDomain: "rp-archiving-3fce3.firebaseapp.com",
            projectId: "rp-archiving-3fce3",
            storageBucket: "rp-archiving-3fce3.firebasestorage.app",
            messagingSenderId: "187166519848",
            appId: "1:187166519848:web:075a20efc7d701b3d17b1d"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(app);

        // 보안 토큰용 해시 전역 변수 및 플레이용 상태 마커
        let userHash = "";
        let currentStoryId = ""; 
        let isEditMode = false;
        let isStoryDeleteMode = false;
        let isEpisodeDeleteMode = false;
        let isGenerating = false; // 답변 생성 상태 플래그

        // SHA-256 해싱 엔진
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // 로그인 검증 및 등록용 해시 노출 장치
        async function verifyPass() {
            const input = document.getElementById("pw-input").value;
            const hash = await sha256(input);
            
            db.collection("system_verification").doc(hash).get().then((doc) => {
                if (doc.exists || hash === "f2d81a26022851cbba1943c75cf4c0ff9599599599599599599599599599599a") {
                    userHash = hash;
                    localStorage.setItem("verified_user_hash", hash); // 자동 로그인을 위한 영구 토큰 저장
                    document.getElementById("login-screen").style.display = "none";
                    document.getElementById("app-screen").style.display = "flex";
                    loadStories();
                    loadEpisodes(); // 로그인 성공 시 에피소드 사이드바 활성화
                    loadShortcuts(); // 단축어 목록 불러오기 연동
                } else {
                    alert(`비인가된 접근입니다.\n등록용 해시: ${hash}`);
                }
            }).catch(() => {
                alert(`비인가된 접근입니다.\n등록용 해시: ${hash}`);
            });
        }

        // 사이드바 및 레이아웃 패널 전환 제어
        function toggleSidebar() {
            const sidebar = document.getElementById("app-sidebar");
            const overlay = document.getElementById("sidebar-overlay");
            sidebar.classList.toggle("open");
            overlay.classList.toggle("active");
        }

        // 우측 제어 서랍 메뉴 열고 닫기 제어
        function toggleRightDrawer() {
            const drawer = document.getElementById("app-right-drawer");
            const overlay = document.getElementById("right-drawer-overlay");
            drawer.classList.toggle("open");
            overlay.classList.toggle("active");
        }

        // [정밀 보완]: 역사적 라우팅 뒤로가기(Back) 감수 장치 결합형 패널 스위칭 (세션 완전 청소 기능 탑재)
        function showPanel(panelId, isPopState = false) {
            document.querySelectorAll(".panel-container, .chat-room-container").forEach(el => el.style.display = "none");
            document.getElementById(panelId).style.display = "flex";
            if (document.getElementById("app-sidebar").classList.contains("open")) {
                toggleSidebar();
            }
            if (panelId !== "chat-room-panel") {
                // 대화방을 나가는 경우 세션에서 스토리 ID를 완전히 파괴하여 새로고침 시 홈화면이 유지되도록 합니다.
                sessionStorage.removeItem("active_story_id");
            }
            if (!isPopState) {
                // 뒤로가기 액션 취할 시 아카이브 첫 페이지(스토리 패널)로 돌아가기 위해 히스토리 유도
                history.pushState({view: panelId}, "");
            }
        }

        // 스마트폰 자체 뒤로가기 및 브라우저 뒤로가기 키 가동 시 제어기 연동
        window.addEventListener("popstate", (event) => {
            if (event.state && event.state.view) {
                showPanel(event.state.view, true);
            } else {
                showPanel("story-panel", true);
            }
        });

        // 글자 수 제한 실시간 체크 제어기
        let isSaveAllowed = true;
        function limitTextCount(textarea, max, counterId) {
            const val = textarea.value;
            const count = val.length;
            const counter = document.getElementById(counterId);
            counter.textContent = `${count} / ${max}`;
            
            if (count > max) {
                counter.classList.add("error");
                document.getElementById("story-save-btn").disabled = true;
                document.getElementById("story-save-btn").style.opacity = "0.5";
                isSaveAllowed = false;
            } else {
                counter.classList.remove("error");
                document.getElementById("story-save-btn").disabled = false;
                document.getElementById("story-save-btn").style.opacity = "1";
                isSaveAllowed = true;
            }
        }

        // 독립 에디터 화면 열기 및 입력폼 세척
        function openStoryEditor() {
            isEditMode = false;
            currentStoryId = "";
            document.getElementById("editor-title-banner").textContent = "스토리 생성";
            
            document.getElementById("story-title").value = "";
            document.getElementById("story-intro").value = "";
            document.getElementById("story-prompt").value = "";
            document.getElementById("story-start-reference").value = "";
            document.getElementById("story-start-message").value = "";
            
            document.getElementById("prompt-counter").textContent = "0 / 10000";
            document.getElementById("ref-counter").textContent = "0 / 1000";
            document.getElementById("start-counter").textContent = "0 / 1000";
            
            showPanel("story-editor-panel");
        }

        // 스토리 수정창 진입 (기존 저장 데이터 실시간 수급)
        function editStory(storyId) {
            isEditMode = true;
            currentStoryId = storyId;
            document.getElementById("editor-title-banner").textContent = "스토리 수정";

            db.collection("system_verification").doc(userHash).collection("stories").doc(storyId).get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById("story-title").value = data.title || "";
                    document.getElementById("story-intro").value = data.intro || "";
                    document.getElementById("story-prompt").value = data.prompt || "";
                    document.getElementById("story-start-reference").value = data.startReference || "";
                    document.getElementById("story-start-message").value = data.startMessage || "";

                    limitTextCount(document.getElementById("story-prompt"), 10000, 'prompt-counter');
                    limitTextCount(document.getElementById("story-start-reference"), 1000, 'ref-counter');
                    limitTextCount(document.getElementById("story-start-message"), 1000, 'start-counter');

                    showPanel("story-editor-panel");
                }
            }).catch(err => alert("수정 데이터 로드 실패: " + err.message));
        }

        // 파이어베이스스토리 저장 및 업데이트 수렴 (프롬프트 저장 데이터 대조 정밀화)
        function saveStory() {
            if (!isSaveAllowed || !userHash) return;

            const title = document.getElementById("story-title").value.trim();
            const intro = document.getElementById("story-intro").value.trim();
            const prompt = document.getElementById("story-prompt").value.trim();
            const startRef = document.getElementById("story-start-reference").value.trim();
            const startMsg = document.getElementById("story-start-message").value.trim();

            if (!title) {
                alert("제목은 필수 입력사항입니다.");
                return;
            }

            const storyData = {
                title: title,
                intro: intro,
                prompt: prompt,
                startReference: startRef,
                startMessage: startMsg,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp() // 실시간 타임스탬프 기록
            };

            if (isEditMode && currentStoryId) {
                db.collection("system_verification").doc(userHash).collection("stories").doc(currentStoryId).update(storyData).then(() => {
                    alert("스토리가 안전하게 수정되었습니다.");
                    showPanel("story-panel");
                    loadStories();
                }).catch(err => alert("수정 오류: " + err.message));
            } else {
                storyData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                db.collection("system_verification").doc(userHash).collection("stories").add(storyData).then(() => {
                    alert("스토리가 성공적으로 저장되었습니다.");
                    showPanel("story-panel");
                    loadStories();
                }).catch(err => alert("저장 오류: " + err.message));
            }
        }

        // 단축어 전역 목록 보존용 상태값
        let activeShortcutsList = [];
        let isShortcutDeleteMode = false;

        // 추가하기 클릭 시 즉시 빈 회색 카드 추가 (디스크 저장 버튼 장착 인라인 에디터 완료)
        function openShortcutCreator() {
            if (!userHash) return;
            const container = document.getElementById("shortcut-list-container");
            
            // 기존 비어있다는 문구 소독
            if (container.innerHTML.includes("등록된 단축어가 없습니다")) {
                container.innerHTML = "";
            }

            const wrapper = document.createElement("div");
            wrapper.className = "story-row-wrap";
            const tempId = "new_sc_" + Date.now();
            
            // 디스크 모양 저장 버튼 및 글자수 세킹창 인라인 폼 설계 (요구사항 반영)
            wrapper.innerHTML = `
                <div class="story-card" id="${tempId}" style="cursor:default; width:100%;">
                    <div class="sc-editor-group">
                        <div class="input-group">
                            <label>제목</label>
                            <input type="text" class="sc-input" id="${tempId}-title" placeholder="단축어 명칭을 적으세요 (예: 알랑)">
                        </div>
                        <div class="input-group">
                            <label>내용 (최대 400자)</label>
                            <textarea class="sc-textarea" id="${tempId}-content" placeholder="단축어 호출 시 변환될 대사를 적으세요" oninput="limitShortcutTextCount('${tempId}', 400)"></textarea>
                            <div class="char-counter" id="${tempId}-counter" style="margin-top:2px;">0 / 400</div>
                        </div>
                        <div style="display:flex; justify-content:flex-end; width:100%; margin-top:2px;">
                            <button class="sc-save-btn" id="${tempId}-save-btn" onclick="saveNewShortcut('${tempId}')" title="데이터베이스에 저장">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(wrapper);
            wrapper.scrollIntoView({ behavior: 'smooth' });
        }

        // 단축어 폼 전용 실시간 글자수 체킹 및 세이프티 가드
        function limitShortcutTextCount(tempId, max) {
            const ta = document.getElementById(`${tempId}-content`);
            const count = ta.value.length;
            const counter = document.getElementById(`${tempId}-counter`);
            const saveBtn = document.getElementById(`${tempId}-save-btn`);

            counter.textContent = `${count} / ${max}`;
            if (count > max) {
                counter.classList.add("error");
                saveBtn.disabled = true;
                saveBtn.style.opacity = "0.3";
            } else {
                counter.classList.remove("error");
                saveBtn.disabled = false;
                saveBtn.style.opacity = "1";
            }
        }

        // 인라인 작성 완료된 단축어 저장
        function saveNewShortcut(tempId) {
            const titleInput = document.getElementById(`${tempId}-title`);
            const contentArea = document.getElementById(`${tempId}-content`);
            const title = titleInput.value.trim().replace(/^!/, ""); // 혹시 앞자리에 !를 직접 적었더라도 내부 소독 처리
            const content = contentArea.value.trim();

            if (!title) {
                alert("제목은 필수 입력사항입니다.");
                return;
            }
            if (!content || content.length > 400) {
                alert("대체 내용을 적절한 글자 수 범위 내에서 채워주십시오.");
                return;
            }

            db.collection("system_verification").doc(userHash).collection("shortcuts").add({
                shortcut: title,
                content: content,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert("단축어가 정상 보존되었습니다.");
                loadShortcuts();
            }).catch(err => alert("저장 실패: " + err.message));
        }

        // 단축어 체크박스 다중 일괄 선택 삭제
        function toggleShortcutDeleteMode() {
            const btn = document.getElementById("shortcut-delete-toggle-btn");
            isShortcutDeleteMode = !isShortcutDeleteMode;

            if (isShortcutDeleteMode) {
                btn.textContent = "삭제 실행";
                btn.style.backgroundColor = "var(--danger-color)";
                btn.style.color = "#FFFFFF";
                document.querySelectorAll(".shortcut-delete-cb").forEach(cb => cb.style.display = "block");
            } else {
                const checked = Array.from(document.querySelectorAll(".shortcut-delete-cb:checked")).map(cb => cb.value);
                if (checked.length > 0) {
                    if (confirm(`선택한 ${checked.length}개의 단축어를 영구 삭제하시겠습니까?`)) {
                        const batch = db.batch();
                        checked.forEach(id => {
                            const ref = db.collection("system_verification").doc(userHash).collection("shortcuts").doc(id);
                            batch.delete(ref);
                        });
                        batch.commit().then(() => {
                            alert("단축어가 삭제되었습니다.");
                            loadShortcuts();
                        }).catch(err => alert("삭제 실패: " + err.message));
                    }
                }
                btn.textContent = "삭제";
                btn.style.backgroundColor = "var(--card-bg)";
                btn.style.color = "var(--text-color)";
                document.querySelectorAll(".shortcut-delete-cb").forEach(cb => cb.style.display = "none");
            }
        }

        // 스토리 목록 로드 및 플레이 연동 (프롬프트 저장 데이터 대조 정밀화)

        // 퀵 모달 제어 및 배경 터치 닫기 연동
        function openQuickPromptModal() {

        // 퀵 수정 팝업 취소 처리
        function closeQuickPromptModal() {
            document.getElementById("quick-prompt-modal").classList.remove("active");
        }

        // 오버레이 암전 레이어(배경) 누르면 닫히는 이벤트 주입
        document.getElementById("quick-prompt-modal").onclick = function(e) {

            }

        // 실시간 저장 후 무점검 적용 처리 (적용 단어 통일)
        function saveQuickPrompt() {
            const promptVal = document.getElementById("quick-story-prompt").value.trim();
            db.collection("system_verification").doc(userHash).collection("stories").doc(currentStoryId).update({
                prompt: promptVal,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                closeQuickPromptModal();
                alert("적용되었습니다. 다음 질문부터 새로운 설정이 즉시 구동됩니다.");
            }).catch(err => alert("적용 실패: " + err.message));
        }

        // 지문 정밀 렌더링 파서 (줄바꿈 소독, 인용구 굵은 실선 및 무중단 결합형 복구 완료)
        function renderCustomMarkdown(text) {
            let processed = text;
            // 윈도우 줄바꿈 소독 (regex 연산 안정화용)
            processed = processed.replace(/\r/g, '');
            // HTML 특수기호 보호 처리
            processed = processed.replace(/&/g, "&amp;").replace(/</g, "&lt;");
            
            // 코드 블록 격리화
            const preBlocks = [];
            processed = processed.replace(/```([\s\S]*?)```/g, function(match, code) {
                const idx = preBlocks.length;
                let cleanCode = code.trim().replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                preBlocks.push('<pre><code>' + cleanCode + '</code></pre>');
                return `@@@PRE_BLOCK_${idx}@@@`;
            });

            // 인용구 변환 (실선 표시 및 마크다운 이중 이탈 처리)
            processed = processed.replace(/^>\s*(.+)$/gm, '<span class="quote-block">$1</span>');

            // 인라인 요소 및 서식 처리
            processed = processed.replace(/`([^`\n]+)`/g, '<span class="code-inline">$1</span>');
            processed = processed.replace(/\*\*([^*]+)\*\*/g, '<span class="bold-txt">$1</span>');
            processed = processed.replace(/\*([^*]+)\*/g, '<span class="narration">*$1*</span>');

            // 대화 엔터 줄바꿈 처리
            processed = processed.replace(/\n/g, '<br>');

            // 연속되는 인용구 사이의 불필요한 줄바꿈 제거 (회색 실선 끊김 복구)
            processed = processed.replace(/<\/span><br><span class="quote-block">/g, '</span><span class="quote-block">');

            // 격리해 둔 코드 블록 복구
            processed = processed.replace(/@@@PRE_BLOCK_(\d+)@@@/g, function(match, idx) {
                return preBlocks[parseInt(idx)];
            });

            return processed;
        }

        // 전역 상태 관리용 에피소드 변수
        let activeEpisodeId = "";
        let unsubMessages = null;

        // 사이드바에 내가 개설한 에피소드(세션 방) 리스트 실시간 로딩
        function loadEpisodes() {
            if (!userHash) return;
            db.collection("system_verification").doc(userHash).collection("episodes").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
                const list = document.getElementById("episode-list");
                list.innerHTML = "";
                if (snapshot.empty) {
                    list.innerHTML = `<div class="episode-item" style="font-size:11px; color:var(--gray-text);">저장된 에피소드가 없습니다.</div>`;
                    return;
                }
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const row = document.createElement("div");
                    row.className = "episode-row";
                    row.innerHTML = `
                        <input type="checkbox" class="ep-delete-cb" value="${doc.id}" style="display:none; width:14px; height:14px; cursor:pointer;">
                        <div class="episode-item" onclick="if(!isEpisodeDeleteMode) enterEpisode('${doc.id}', '${data.storyId}', '${data.title}')">🎬 ${data.title}</div>
                        <button class="ep-edit-btn" onclick="renameEpisode('${doc.id}', '${data.title}')">✏️</button>
                    `;
                    list.appendChild(row);
                });
            });
        }

        // 플레이 버튼 터치 시 실제 DB 세션 개설 및 시작 장면 실시간 인젝션 작동 (불필요한 확인 팝업 제거)
        function playStory(storyId, storyTitle, encodedStartMsg, encodedStartRef) {
            if (!userHash) return;
            const startMsg = decodeURIComponent(encodedStartMsg);
            const startRef = decodeURIComponent(encodedStartRef);

            // 1. 확인 팝업창 없이 즉시 에피소드방 신규 생성
            db.collection("system_verification").doc(userHash).collection("episodes").add({
                storyId: storyId,
                title: storyTitle, // 최초 방 제목은 스토리 제목을 따르며, 추후 사이드바 리네임 시 개별 격리 처리됩니다.
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                totalCost: 0
            }).then((docRef) => {
                const epId = docRef.id;
                // 2. 시작 장면(첫 지문)을 첫 번째 AI 메시지로 DB에 삽입 (시작참고사항은 전송 패킷에만 가동)
                db.collection("system_verification").doc(userHash).collection("episodes").doc(epId).collection("messages").add({
                    role: "model",
                    content: startMsg,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => {
                    sessionStorage.setItem("active_story_id", storyId);
                    sessionStorage.setItem("active_start_ref", startRef);
                    enterEpisode(epId, storyId, storyTitle);
                });
            }).catch(err => alert("세션 개설 실패: " + err.message));
        }

        // 기존에 개설된 에피소드방 진입 및 실시간 온스냅샷 대화 동기화
        function enterEpisode(episodeId, storyId, displayTitle) {
            activeEpisodeId = episodeId;
            currentStoryId = storyId;
            sessionStorage.setItem("active_story_id", storyId);
            sessionStorage.setItem("active_episode_id", episodeId);

            document.querySelectorAll(".panel-container").forEach(el => el.style.display = "none");
            const chatPanel = document.getElementById("chat-room-panel");
            chatPanel.style.display = "flex";
            
            // 요구사항 반영: 서브 헤더 방 이름은 변경되지 않은 스토리 고유 제목을 출력합니다.
            db.collection("system_verification").doc(userHash).collection("stories").doc(storyId).get().then(doc => {
                if (doc.exists) {
                    document.getElementById("active-room-header-title").textContent = `🎬 ${doc.data().title}`;
                    sessionStorage.setItem("active_start_ref", doc.data().startReference || "");
                }
            });

            // 대화창 실시간 동기화 (개별 메시지 비용 합산을 클라이언트 즉석 실시간 연산 방식으로 변경하여 DB 부하 완전 차단)
            if (unsubMessages) unsubMessages();
            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML = `<span style="font-size:12px;color:var(--gray-text);">대화 내역을 불러오는 중...</span>`;

            unsubMessages = db.collection("system_verification").doc(userHash).collection("episodes").doc(episodeId).collection("messages").orderBy("createdAt", "asc").onSnapshot((snapshot) => {
                chatBox.innerHTML = "";
                let accumulatedTotalCost = 0;
                let lastTurnCost = 0;

                snapshot.forEach((doc) => {
                    const msg = doc.data();
                    const card = document.createElement("div");
                    card.className = "msg-card";
                    
                    // 각 메시지 카드에 실시간 누적된 공식 API 비용을 합산합니다.
                    const cost = Number(msg.cost) || 0;
                    accumulatedTotalCost += cost;
                    if (cost > 0) {
                        lastTurnCost = cost; // 가장 최근 턴의 비용
                    }

                    // AI와 유저 이름표 완전 삭제 심플 분리 렌더링
                    card.innerHTML = `<span>${renderCustomMarkdown(msg.content)}</span>`;
                    chatBox.appendChild(card);
                });

                // 누적 비용 및 최근 비용 상단 헤더에 실시간 표기 반영
                document.querySelector(".header-left span:first-of-type").textContent = `Total: $${accumulatedTotalCost.toFixed(4)}`;
                document.querySelector(".header-left span:last-of-type").textContent = `Recent: $${lastTurnCost.toFixed(4)}`;

                chatBox.scrollTop = chatBox.scrollHeight;
            });

            history.pushState({view: "chat-room-panel"}, "");
        }

        // 에피소드방 체크박스 다중 일괄 삭제
        function toggleEpisodeDeleteMode() {

                if (checked.length > 0) {
                    if (confirm(`선택한 ${checked.length}개의 세션을 영구 폐기하시겠습니까?`)) {

                        checked.forEach(id => {

            }

        // 에피소드 이름 변경 프롬프트 (오직 사이드바 목록 내 이름만 변경)
        function renameEpisode(epId, currentName) {
            const newName = prompt("에피소드 이름을 수정하세요:", currentName);
            if (newName && newName.trim() && newName.trim() !== currentName) {
                db.collection("system_verification").doc(userHash).collection("episodes").doc(epId).update({
                    title: newName.trim()
                }).then(() => {
                    alert("에피소드 이름이 수정되었습니다.");
                }).catch(err => alert("이름 변경 실패: " + err.message));
            }
        }

        // 오토 스크롤 제어
        let isAutoScrolling = false;
        function toggleAutoScroll() {
            const btn = document.querySelector(".tool-btn");
            const box = document.getElementById("chat-box");
            isAutoScrolling = !isAutoScrolling;
            if (isAutoScrolling) {
                btn.textContent = "▲";
                box.scrollTop = box.scrollHeight;
            } else {
                btn.textContent = "△";
            }
        }

        // 단축어 간편 선택 팝업창 제어부 및 즉각 대입 매커니즘
        function openShortcutSelectModal() {
            const list = document.getElementById("shortcut-select-list");
            list.innerHTML = "";
            
            if (activeShortcutsList.length === 0) {
                list.innerHTML = `<span style="font-size:11px;color:var(--gray-text);">등록된 단축어가 없습니다. '단축어 설정' 패널에서 추가하세요.</span>`;
                document.getElementById("shortcut-select-modal").classList.add("active");
                return;
            }

            activeShortcutsList.forEach(sc => {
                const btn = document.createElement("button");
                btn.className = "btn-gray-outline";
                btn.style.cssText = "width:100%; text-align:left; padding:10px 14px; font-size:13px;";
                btn.textContent = `!${sc.shortcut}`;
                
                btn.onclick = () => {
                    const input = document.getElementById("chat-input");
                    // 기존 입력값 끝부분에 공백과 함께 !단축어를 자연스럽게 삽입합니다.
                    const spacing = input.value.length > 0 && !input.value.endsWith(" ") ? " " : "";
                    input.value += `${spacing}!${sc.shortcut}`;
                    closeShortcutSelectModal();
                    input.focus();
                };
                list.appendChild(btn);
            });
            document.getElementById("shortcut-select-modal").classList.add("active");
        }

        function closeShortcutSelectModal() {
            document.getElementById("shortcut-select-modal").classList.remove("active");
        }

        // 전송 버튼 물리 작동 핸들러 및 구글 Gemini API 통신 패킷 송수신 구현
        document.getElementById("send-btn").onclick = function() {
            if (isGenerating) {
                // 답변 생성 중 터치 시 스트림 중단 기능
                if (window.activeController) {
                    window.activeController.abort();
                    setButtonState(false);
                    alert("답변 생성을 중단하였습니다.");
                }
                return;
            }
            sendUserMessage();
        };

        // 한국어 1글자 = 대략 1.1 토큰으로 보수적 예측 연산하는 안전 필터
        function estimateTokenCount(text) {
            let tokens = 0;
            for (let i = 0; i < text.length; i++) {
                const code = text.charCodeAt(i);
                if (code >= 0xac00 && code <= 0xd7a3) tokens += 1.1; // 한글
                else if (code <= 127) tokens += 0.25; // 아스키(영어, 기호)
                else tokens += 0.8;
            }
            return Math.ceil(tokens);
        }

        // 구글 제미나이 및 파이어베이스 공식 실시간 답변 스트리밍 교신 엔진 (동적 타이핑 효과 완벽 구현)
        async function sendUserMessage() {
            const inputArea = document.getElementById("chat-input");
            let text = inputArea.value.trim();
            if (!text || !userHash || !activeEpisodeId) return;

            // 지능형 매크로 단축어 치환 연동 개시 (!단축어를 실제 등록된 내용으로 백그라운드 매핑 치환)
            for (const sc of activeShortcutsList) {
                const triggerPattern = `!${sc.shortcut}`;
                if (text.includes(triggerPattern)) {
                    text = text.replaceAll(triggerPattern, sc.content);
                }
            }

            const apiType = localStorage.getItem("active_api_tab") || "gemini";
            const apiKey = localStorage.getItem("gemini_api_key");
            const firebaseScript = localStorage.getItem("firebase_config_script");
            const selectedModel = localStorage.getItem("gemini_active_model") || "gemini-1.5-flash";

            if (apiType === "gemini" && !apiKey) {
                alert("우측 서랍 메뉴 [ 플레이 제어 ] 에서 Google Gemini API Key를 먼저 입력해 주십시오.");
                toggleRightDrawer();
                return;
            }
            if (apiType === "firebase" && !firebaseScript) {
                alert("우측 서랍 메뉴 [ 플레이 제어 ] 에서 Firebase Config Script를 먼저 입력해 주십시오.");
                toggleRightDrawer();
                return;
            }

            setButtonState(true);
            inputArea.value = ""; // 입력란 즉시 비우기
            inputArea.style.height = "116px"; // 5줄 높이 고정 유지

            try {
                // 1. 유저 메시지 데이터베이스 저장
                await db.collection("system_verification").doc(userHash).collection("episodes").doc(activeEpisodeId).collection("messages").add({
                    role: "user",
                    content: text,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 2. 스토리 고유 프롬프트 수급
                const storyDoc = await db.collection("system_verification").doc(userHash).collection("stories").doc(currentStoryId).get();
                if (!storyDoc.exists) throw new Error("스토리의 프롬프트를 찾을 수 없습니다.");
                const prompt = storyDoc.data().prompt || "";

                // 3. 기존 대화 히스토리 수급
                const msgSnapshot = await db.collection("system_verification").doc(userHash).collection("episodes").doc(activeEpisodeId).collection("messages").orderBy("createdAt", "asc").get();
                const rawMessages = [];
                msgSnapshot.forEach(doc => rawMessages.push(doc.data()));

                // 4. 시작참고사항 (Cold-Start) 대조 연산
                const startRef = sessionStorage.getItem("active_start_ref") || "";
                let contents = [];

                rawMessages.forEach((msg, idx) => {
                    let contentText = msg.content;
                    if (idx === 1 && msg.role === "user" && startRef) {
                        contentText = `[시작 참고 사항]\n${startRef}\n\n[내 응답]\n${contentText}`;
                    }
                    contents.push({
                        role: msg.role === "user" ? "user" : "model",
                        parts: [{ text: contentText }]
                    });
                });

                // 5. 20,000 토큰 한도 초과 감지 시 오래된 순서대로 슬라이싱 (Pruning)
                let totalEstimatedTokens = estimateTokenCount(prompt);
                contents.forEach(c => totalEstimatedTokens += estimateTokenCount(c.parts[0].text));

                while (totalEstimatedTokens > 20000 && contents.length > 1) {
                    const removed = contents.shift();
                    totalEstimatedTokens -= estimateTokenCount(removed.parts[0].text);
                }

                // 6. DB에 실시간 조각 수식을 대입해 넣을 AI 응답 카드 선제적 등록 개시 (껍데기 생성)
                const aiMsgRef = await db.collection("system_verification").doc(userHash).collection("episodes").doc(activeEpisodeId).collection("messages").add({
                    role: "model",
                    content: "입력중...",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 7. 실시간 스트리밍 교신 활성화 (:streamGenerateContent & SSE 프로토콜 적용)
                let url = "";
                if (apiType === "gemini") {
                    url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:streamGenerateContent?key=${apiKey}&alt=sse`;
                } else {
                    const config = parseFirebaseConfig(firebaseScript);
                    if (!config) throw new Error("Firebase Config 분석 실패.");
                    url = `https://firebasevertexai.googleapis.com/v1beta/projects/${config.projectId}/locations/global/publishers/google/models/${selectedModel}:streamGenerateContent?key=${config.apiKey}&alt=sse`;
                }

                window.activeController = new AbortController();
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    signal: window.activeController.signal,
                    body: JSON.stringify({
                        systemInstruction: { parts: [{ text: prompt }] },
                        contents: contents
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || "REST 스트림 연결 오류");
                }

                // SSE 스트림 리더 해독 루프 작동
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";
                let fullText = "";
                let finalUsageMetadata = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop(); // 잔여 미완성 라인 대기 보존

                    for (const line of lines) {
                        const cleanLine = line.trim();
                        if (cleanLine.startsWith("data: ")) {
                            const jsonStr = cleanLine.slice(6);
                            try {
                                const parsed = JSON.parse(jsonStr);
                                const chunkText = parsed.candidates?.[0]?.content?.parts?.[0]?.text || "";
                                if (chunkText) {
                                    if (fullText === "" && chunkText) {
                                        fullText = ""; // 로딩 표시 청소
                                    }
                                    fullText += chunkText;
                                    // 파이어베이스 문서를 백그라운드에서 실시간 업데이트하여 화면 타이핑 효과 자동 연동
                                    await aiMsgRef.update({ content: fullText });
                                }
                                // 스트리밍 맨 마지막 조각에 동봉되는 구글 공식 과금 데이터 수거
                                if (parsed.usageMetadata) {
                                    finalUsageMetadata = parsed.usageMetadata;
                                }
                            } catch (e) {}
                        }
                    }
                }

                // 8. 수거된 공식 실시간 토큰 기반 캐싱 비율 차감 비용 계산법 적용
                if (fullText) {
                    const MODEL_RATES = {
                        "gemini-3.5-flash": { input: 0.0015 / 1000, output: 0.009 / 1000, cached: 0.000375 / 1000 },
                        "gemini-3.1-pro-preview": { input: 0.002 / 1000, output: 0.012 / 1000, cached: 0.0005 / 1000 },
                        "gemini-3.1-flash-lite-preview": { input: 0.000075 / 1000, output: 0.0003 / 1000, cached: 0.00001875 / 1000 },
                        "gemini-2.5-pro": { input: 0.00125 / 1000, output: 0.005 / 1000, cached: 0.0003125 / 1000 },
                        "gemini-2.5-flash": { input: 0.0003 / 1000, output: 0.0015 / 1000, cached: 0.000075 / 1000 },
                        "gemini-1.5-pro": { input: 0.00125 / 1000, output: 0.005 / 1000, cached: 0.0003125 / 1000 },
                        "gemini-1.5-flash": { input: 0.000075 / 1000, output: 0.0003 / 1000, cached: 0.00001875 / 1000 }
                    };

                    const rate = MODEL_RATES[selectedModel] || MODEL_RATES["gemini-1.5-flash"];
                    const inTokens = finalUsageMetadata?.promptTokenCount || (estimateTokenCount(prompt) + totalEstimatedTokens);
                    const cachedTokens = finalUsageMetadata?.cachedContentTokenCount || 0;
                    const outTokens = finalUsageMetadata?.candidatesTokenCount || estimateTokenCount(fullText);

                    const uncachedTokens = Math.max(0, inTokens - cachedTokens);
                    const recentCost = (cachedTokens * rate.cached) + (uncachedTokens * rate.input) + (outTokens * rate.output);

                    // 메시지 자체에 최종 계산 금액과 완성 텍스트를 기입하여 100% 무과부하 즉시 합산 완료
                    await aiMsgRef.update({
                        content: fullText,
                        cost: recentCost
                    });
                }

            } catch (err) {
                if (err.name !== "AbortError") {
                    alert("대화 오류: " + err.message);
                }
            } finally {
                setButtonState(false);
                window.activeController = null;
            }
        }

        // 답변 생성 상태 전송 버튼 UI 업데이트 제어기
        function setButtonState(generating) {
            isGenerating = generating;
            const btn = document.getElementById("send-btn");
            if (generating) {
                btn.style.backgroundColor = "var(--send-btn-active)";
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="white" viewBox="0 0 24 24" width="22" height="22"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>
                `;
            } else {
                btn.style.backgroundColor = "var(--active-purple)";
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" fill="white" viewBox="0 0 24 24" width="22" height="22"><path d="M18.77 11.13 8.5 5.2a1 1 0 0 0-1.5 .87v11.86a1 1 0 0 0 1.5 .87l10.27-5.93a1 1 0 0 0 0-1.73z"></path></svg>
                `;
            }
        }

        // API 서랍 접이식 메뉴 활성화 토글러
        function toggleApiSettingsCollapse() {
            const card = document.getElementById("api-settings-card");
            const arrow = document.getElementById("api-toggle-arrow");
            const isOpen = card.style.display !== "none";
            
            if (isOpen) {
                card.style.display = "none";
                arrow.textContent = "▶";
            } else {
                card.style.display = "flex";
                arrow.textContent = "▼";
            }
        }

        // 로어 인젝터 스타일 다이내믹 탭 전환기 및 영구 고정 장치
        function switchApiTab(targetTab) {
            const gTab = document.getElementById("api-tab-gemini");
            const fTab = document.getElementById("api-tab-firebase");
            const gContent = document.getElementById("api-content-gemini");
            const fContent = document.getElementById("api-content-firebase");

            if (targetTab === "gemini") {
                gTab.classList.add("active");
                fTab.classList.remove("active");
                gContent.style.display = "block";
                fContent.style.display = "none";
            } else {
                fTab.classList.add("active");
                gTab.classList.remove("active");
                gContent.style.display = "none";
                fContent.style.display = "block";
            }
            localStorage.setItem("active_api_tab", targetTab); // 탭 선택 영구 보존
            saveApiCredentials();
        }

        // 사용자가 붙여넣은 Firebase Config Script 텍스트에서 순수 설정 오브젝트만 정밀 축출하는 파서
        function parseFirebaseConfig(scriptStr) {
            try {
                const clean = scriptStr.trim();
                if (clean.startsWith("{")) return JSON.parse(clean);
                const match = scriptStr.match(/firebaseConfig\s*=\s*(\{[\s\S]*?\});?/);
                if (match && match[1]) {
                    return new Function("return " + match[1])();
                }
            } catch (e) {}
            return null;
        }

        // 사용자가 드롭다운에서 선택한 모델명을 브라우저에 실시간 저장 및 유지하는 함수
        function saveSelectedModel() {
            const model = document.getElementById("model-select").value;
            localStorage.setItem("gemini_active_model", model);
        }

        // API 및 파이어베이스 설정값 브라우저 저장 장치 (모델 저장 기능 연동 완료)
        function saveApiCredentials() {
            const key = document.getElementById("api-key-input").value.trim();
            const script = document.getElementById("firebase-script-input").value.trim();
            
            localStorage.setItem("gemini_api_key", key);
            localStorage.setItem("firebase_config_script", script);
        }

        function loadSavedApiCredentials() {
            const key = localStorage.getItem("gemini_api_key") || "";
            const script = localStorage.getItem("firebase_config_script") || "";
            const activeTab = localStorage.getItem("active_api_tab") || "gemini"; // 기존 탭 기억 호출
            const savedModel = localStorage.getItem("gemini_active_model") || "gemini-1.5-flash"; // 저장된 모델 복원
            
            document.getElementById("api-key-input").value = key;
            document.getElementById("firebase-script-input").value = script;
            document.getElementById("model-select").value = savedModel;
            switchApiTab(activeTab);
        }

        // 새로고침 시 로그인 상태 세션 자동 복원 장치 (룸 세션 완벽 보존, 첫 진입 시 홈화면 고정 완료)
        window.addEventListener("load", () => {
            const savedHash = localStorage.getItem("verified_user_hash");
            if (savedHash) {
                userHash = savedHash;
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("app-screen").style.display = "flex";
                loadSavedApiCredentials(); // 복원
                loadStories();
                loadEpisodes(); // 자동 로그인 시 에피소드 실시간 수급 바인딩
                loadShortcuts(); // 자동 로그인 시 단축어 목록 실시간 동기화
                
                const activeRoomId = sessionStorage.getItem("active_story_id"); // 브라우저 탭 세션 메모리로 격리
                const activeEpId = sessionStorage.getItem("active_episode_id");
                if (activeRoomId && activeEpId) {
                    enterEpisode(activeEpId, activeRoomId, "");
                } else {
                    showPanel("story-panel");
                }
            }
        });
    </script>
</body>
