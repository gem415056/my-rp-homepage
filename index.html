<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>롤플레잉 아카이브</title>
    <style>
        /* 테마별 전역 변수 */
        :root {
            --bg-color: #FFFFFF;
            --text-color: #2C3E50;
            --border-color: #E6E6E6;
            --accent-color: #BCD0D8;
            --card-bg: #F9F9F9;
            --pastel-purple-bg: #F3EBF7;
            --pastel-purple-text: #53118D;
            --active-purple: #D5C2DE;
            --gray-text: #888888;
            --danger-color: #FF4433;
        }

        body[data-theme="dark"] {
            --bg-color: #242321;
            --text-color: #F0EFEB;
            --border-color: #42413D;
            --card-bg: #1A1918;
            --pastel-purple-bg: #382D42;
            --pastel-purple-text: #D5C2DE;
            --active-purple: #614F73;
            --gray-text: #A0A0A0;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* 1. 보안 진입 페이지 (구글 스타일) */
        #login-screen {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            width: 100%; height: 100%; box-sizing: border-box; padding: 20px;
        }

        .search-box {
            display: flex; align-items: center; width: 100%; max-width: 500px;
            border: 1px solid var(--border-color); border-radius: 24px;
            padding: 6px 14px; box-sizing: border-box;
            background: transparent; transition: 0.2s;
        }

        .search-box:focus-within {
            box-shadow: 0 1px 6px rgba(32,33,36,0.2);
            border-color: transparent;
        }

        .search-box input {
            flex: 1; border: none; outline: none; background: transparent;
            color: var(--text-color); font-size: 16px; padding: 8px 0;
        }

        .search-box button {
            background: none; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            padding: 0 8px;
        }

        /* 2. 메인 앱 화면 */
        #app-screen {
            display: none; width: 100%; height: 100%; flex-direction: column; position: relative;
        }

        /* 헤더 영역 */
        .app-header {
            height: 48px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; box-sizing: border-box; font-size: 11px; color: var(--gray-text);
            background-color: var(--bg-color); z-index: 10;
        }

        .header-left { display: flex; gap: 8px; font-weight: 500; align-items: center; }
        .header-right { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #9AA0A6; }
        .status-dot.active { background: #3DDC84; }

        /* 가로 세줄 삼지창 버튼 */
        .menu-trigger {
            background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-color);
            padding: 0; margin-right: 12px; display: flex; align-items: center;
        }

        /* 사이드바 메뉴 */
        .sidebar {
            position: absolute; top: 0; left: -280px; width: 280px; height: 100%;
            background-color: var(--bg-color); border-right: 1px solid var(--border-color);
            z-index: 30; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; box-shadow: 2px 0 12px rgba(0,0,0,0.1);
        }

        .sidebar.open { left: 0; }

        .sidebar-header {
            height: 48px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; padding: 0 16px; justify-content: space-between;
        }

        .sidebar-content {
            flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px;
        }

        .menu-item {
            padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold;
            transition: 0.2s; display: flex; align-items: center;
        }

        .menu-item:hover { background-color: var(--card-bg); }
        
        .sidebar-section-title-row {
            display: flex; justify-content: space-between; align-items: center; margin: 16px 0 8px 4px;
        }
        .sidebar-section-title { font-size: 11px; color: var(--gray-text); font-weight: bold; }
        .sidebar-action-btn { background: none; border: none; font-size: 10px; color: var(--gray-text); cursor: pointer; }

        /* 에피소드 리스트 아이템 */
        .episode-row {
            display: flex; align-items: center; gap: 6px; width: 100%; box-sizing: border-box;
        }
        .episode-item {
            flex: 1; padding: 8px 12px; font-size: 13px; color: var(--text-color); cursor: pointer;
            border-radius: 6px; transition: 0.2s; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .episode-item:hover { background-color: var(--card-bg); }
        .ep-edit-btn { background: none; border: none; color: var(--gray-text); cursor: pointer; padding: 4px; font-size: 11px; }

        /* 암전 오버레이 */
        .overlay {
            position: absolute; inset: 0; background-color: rgba(0,0,0,0.4);
            z-index: 20; display: none;
        }
        .overlay.active { display: block; }

        /* 메인 컨텐츠 영역 */
        .main-container {
            flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        /* 일반 패널 컨테이너 */
        .panel-container {
            flex: 1; overflow-y: auto; padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 16px;
        }

        .panel-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
        }

        .panel-title { font-size: 18px; font-weight: bold; }

        /* 회색 테두리 기본 버튼 */
        .btn-gray-outline {
            border: 1px solid var(--border-color); background-color: var(--card-bg);
            color: var(--text-color); padding: 8px 16px; border-radius: 8px;
            font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-gray-outline:hover { filter: brightness(0.95); }

        .btn-play-theme {
            border: 1px solid var(--border-color); background-color: var(--active-purple);
            color: var(--text-color); padding: 8px 16px; border-radius: 8px;
            font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-play-theme:hover { filter: brightness(0.93); }

        /* 지식 가두리 카드 양식 */
        .boxed-card {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 16px; display: flex; flex-direction: column;
            gap: 12px; box-sizing: border-box;
        }

        /* 스토리 카드 디자인 */
        .story-row-wrap { display: flex; align-items: center; gap: 8px; width: 100%; }
        .story-card {
            flex: 1; background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 16px; display: flex; justify-content: space-between;
            align-items: center; box-sizing: border-box; transition: 0.2s; cursor: pointer;
        }
        .story-card:hover { border-color: var(--accent-color); }
        .story-info { display: flex; flex-direction: column; gap: 4px; text-align: left; }
        .story-name { font-size: 14px; font-weight: bold; }
        .story-intro { font-size: 11px; color: var(--gray-text); }

        /* 로어 인젝터 격자형 소제목 디자인 */
        .card-subheader {
            font-size: 13px; font-weight: bold; color: #74A1C0;
            padding-bottom: 6px; border-bottom: 1px dashed var(--border-color);
            text-align: left; margin-bottom: 4px;
        }

        /* 폼 입력창 양식 */
        .input-group { display: flex; flex-direction: column; gap: 6px; text-align: left; }
        .input-group label { font-size: 11px; font-weight: bold; color: var(--gray-text); }
        .input-group input, .input-group textarea {
            border: 1px solid var(--border-color); border-radius: 8px;
            background: var(--bg-color); color: var(--text-color); font-size: 13px;
            padding: 10px; box-sizing: border-box; outline: none; font-family: inherit;
        }
        .input-group textarea { resize: none; }
        .char-counter { font-size: 10px; color: var(--gray-text); text-align: right; margin-top: -6px; }
        .char-counter.error { color: var(--danger-color); font-weight: bold; }

        /* 대화방 서브 헤더 */
        .chat-sub-header {
            height: 38px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; color: var(--text-color);
            cursor: pointer; background-color: var(--bg-color);
        }
        .chat-sub-header:hover { text-decoration: underline; }

        /* 대화방 내부 (패딩 상향 조정) */
        .chat-room-container {
            display: none; flex-direction: column; width: 100%; height: 100%; overflow: hidden;
        }
        .chat-container {
            flex: 1; overflow-y: auto; box-sizing: border-box; padding: 20px 24px;
        }

        /* 메시지 디자인 (회색 실선 구분, 마진 상향 조정) */
        .msg-card {
            padding: 18px 0; border-bottom: 1px solid var(--border-color);
            line-height: 1.6; font-size: 15px; word-break: break-all; text-align: left;
        }

        .sender-row { display: flex; width: 100%; margin-bottom: 8px; }
        .msg-sender-badge {
            display: inline-block; border: 1px solid var(--active-purple);
            border-radius: 12px; padding: 3px 12px; font-size: 11px; font-weight: bold;
            background-color: var(--bg-color); color: var(--text-color);
            margin-left: auto; cursor: pointer;
        }

        .msg-card .narration { color: var(--gray-text); }
        .msg-card .bold-txt { font-weight: bold; }
        .msg-card .code-inline {
            background-color: var(--pastel-purple-bg); color: var(--pastel-purple-text);
            font-weight: bold; border-radius: 4px; padding: 2px 6px; margin: 0 2px;
        }
        .msg-card .quote-block {
            border-left: 3px dotted var(--text-color); padding-left: 12px;
            margin: 8px 0 8px 8px; color: var(--gray-text); display: block;
        }

        /* 하단 컨트롤 바 및 입력창 */
        .footer-control {
            border-top: 1px solid var(--border-color); padding: 8px;
            display: flex; flex-direction: column; gap: 6px; box-sizing: border-box;
            background-color: var(--bg-color);
        }

        .input-toolbar {
            display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--gray-text);
        }

        .tool-btn {
            background: none; border: none; color: var(--gray-text); cursor: pointer;
            padding: 2px 6px; font-size: 13px; transition: 0.2s;
        }

        .tool-btn:hover { color: var(--text-color); }
        .vertical-divider { width: 1px; height: 14px; border-left: 1px dashed var(--border-color); margin: 0 2px; }

        .input-area {
            display: flex; gap: 8px; align-items: flex-end;
        }

        .input-area textarea {
            flex: 1; height: 38px; max-height: 120px; border: 1px solid var(--border-color);
            border-radius: 12px; background: transparent; color: var(--text-color);
            padding: 8px 12px; box-sizing: border-box; resize: none; font-size: 14px; outline: none;
        }

        .hold-btn {
            width: 48px; height: 38px; border-radius: 19px; border: 1px solid var(--border-color);
            background: transparent; color: var(--text-color); cursor: pointer;
            display: flex; align-items: center; justify-content: center; position: relative;
            font-size: 13px; font-weight: bold; box-sizing: border-box;
        }

        /* 응답교정기 스타일 전역 팝업 모달 */
        .global-popup-overlay {
            position: absolute; inset: 0; background-color: rgba(0,0,0,0.5);
            z-index: 50; display: none; align-items: center; justify-content: center; padding: 16px;
        }
        .global-popup-overlay.active { display: flex; }

        .global-popup-modal {
            background-color: var(--bg-color); border: 1px solid var(--border-color);
            border-radius: 16px; width: 100%; max-width: 500px; padding: 24px;
            box-sizing: border-box; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; gap: 14px;
        }
    </style>
</head>
<body>

    <!-- 1. 진입 검증 스크린 -->
    <div id="login-screen">
        <div class="search-box">
            <input type="password" id="pw-input" placeholder="" onkeydown="if(event.key === 'Enter') verifyPass()">
            <button onclick="verifyPass()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="var(--text-color)" viewBox="0 0 24 24" width="24px" height="24px"><path fill-rule="evenodd" d="M10.26 2.01a8.25 8.25 0 1 0 5.24 14.62l5.31 5.32 1.14-1.14-5.32-5.3A8.25 8.25 0 0 0 10.26 2m-6.65 8.25a6.65 6.65 0 1 1 13.3 0 6.65 6.65 0 0 1-13.3 0" clip-rule="evenodd"></path></svg>
            </button>
        </div>
    </div>

    <!-- 2. 플레이 웹 메인 인터페이스 -->
    <div id="app-screen">
        <!-- 최상단 헤더 -->
        <div class="app-header">
            <div class="header-left">
                <button class="menu-trigger" onclick="toggleSidebar()">☰</button>
                <span>Total: $0.0000</span>
                <span>|</span>
                <span>Recent: $0.0000</span>
            </div>
            <div class="header-right">
                <div class="status-dot active" id="latency-dot"></div>
                <span id="latency-text">G3.1: 0.00s</span>
            </div>
        </div>

        <!-- 왼쪽 사이드바 영역 -->
        <div class="sidebar" id="app-sidebar">
            <div class="sidebar-header">
                <span style="font-weight: bold; font-size: 14px;">메뉴</span>
                <button class="menu-trigger" onclick="toggleSidebar()">✕</button>
            </div>
            <div class="sidebar-content">
                <div class="menu-item" onclick="showPanel('story-panel')">🎬 스토리</div>
                <div class="menu-item" onclick="showPanel('shortcut-panel')">⌨️ 단축어</div>
                <div class="menu-item" onclick="showPanel('cost-panel')">💳 비용 분석</div>
                
                <!-- 에피소드 관리 및 삭제 보조 바 -->
                <div class="sidebar-section-title-row">
                    <span class="sidebar-section-title">에피소드</span>
                    <button class="sidebar-action-btn" onclick="toggleEpisodeDeleteMode()">삭제</button>
                </div>
                <div id="episode-list" style="display:flex; flex-direction:column; gap:4px;">
                    <!-- Firebase 로드 에피소드 영역 -->
                </div>
            </div>
        </div>
        <div class="overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- 메인 동적 컨테이너 -->
        <div class="main-container" id="main-container">
            
            <!-- A. 스토리 목록 패널 -->
            <div class="panel-container" id="story-panel">
                <div class="panel-header">
                    <span class="panel-title">스토리</span>
                    <div>
                        <button class="btn-gray-outline" id="story-delete-toggle-btn" onclick="toggleStoryDeleteMode()" style="margin-right:4px;">삭제</button>
                        <button class="btn-gray-outline" onclick="openStoryEditor()">만들기</button>
                    </div>
                </div>
                <div id="story-list-container" style="display:flex; flex-direction:column; gap:10px;"></div>
            </div>

            <!-- B. 스토리 생성/편집 독립형 에디터 화면 (넓고 큰 입력창 및 카드 배치 완성) -->
            <div class="panel-container" id="story-editor-panel" style="display:none; padding-bottom: 40px;">
                <div class="panel-header">
                    <button class="btn-gray-outline" onclick="showPanel('story-panel')">취소</button>
                    <span class="panel-title" id="editor-title-banner">스토리 생성</span>
                    <button class="btn-gray-outline" onclick="saveStory()" id="story-save-btn">저장</button>
                </div>

                <!-- 섹션 1: 프로필 카드 -->
                <div class="boxed-card">
                    <div class="card-subheader">프로필</div>
                    <div class="input-group">
                        <label>제목</label>
                        <input type="text" id="story-title" placeholder="스토리 제목을 적으세요">
                    </div>
                    <div class="input-group">
                        <label>한 줄 소개</label>
                        <input type="text" id="story-intro" placeholder="스토리에 대해 짧게 설명해 주세요">
                    </div>
                </div>

                <!-- 섹션 2: 스토리 설정 카드 (세로 길이 400px 상향 가독성 극대화) -->
                <div class="boxed-card">
                    <div class="card-subheader">스토리 설정</div>
                    <div class="input-group">
                        <label>스토리 세계관 및 시스템 프롬프트 (최대 10,000자)</label>
                        <textarea id="story-prompt" style="height:400px;" placeholder="스토리의 기본 세계관과 캐릭터 세부 지침을 적으세요" oninput="limitTextCount(this, 10000, 'prompt-counter')"></textarea>
                        <div class="char-counter" id="prompt-counter">0 / 10000</div>
                    </div>
                </div>

                <!-- 섹션 3: 시작 설정 카드 (시작장면 200px, 시작참고 150px 교체 연동) -->
                <div class="boxed-card">
                    <div class="card-subheader">시작 설정</div>
                    <div class="input-group">
                        <label>시작 장면 (최대 1,000자)</label>
                        <textarea id="story-start-message" style="height:200px;" placeholder="플레이 시작 시 캐릭터가 건넬 대사를 적으세요" oninput="limitTextCount(this, 1000, 'start-counter')"></textarea>
                        <div class="char-counter" id="start-counter">0 / 1000</div>
                    </div>
                    <div class="input-group">
                        <label>시작 참고 사항 (최대 1,000자 / 선택 사항)</label>
                        <textarea id="story-start-reference" style="height:150px;" placeholder="첫 메시지 연출 시에만 한시적으로 참고할 설정이나 팁을 적으세요 (생략 가능)" oninput="limitTextCount(this, 1000, 'ref-counter')"></textarea>
                        <div class="char-counter" id="ref-counter">0 / 1000</div>
                    </div>
                </div>
            </div>

            <!-- C. 단축어 관리 패널 -->
            <div class="panel-container" id="shortcut-panel" style="display:none;">
                <span class="panel-title">단축어 설정</span>
            </div>

            <!-- D. 비용 분석 패널 -->
            <div class="panel-container" id="cost-panel" style="display:none;">
                <span class="panel-title">비용 분석</span>
            </div>

            <!-- E. 실제 채팅 대화방 패널 -->
            <div class="chat-room-container" id="chat-room-panel">
                <!-- 스토리 빠른 수정을 위한 중앙 상단 고정 서브 헤더 -->
                <div class="chat-sub-header" id="active-room-header-title" onclick="openQuickPromptModal()"></div>
                <div class="chat-container" id="chat-box"></div>
                <div class="footer-control">
                    <div class="input-toolbar">
                        <button class="tool-btn" onclick="toggleAutoScroll()">△</button>
                        <button class="tool-btn">♡</button>
                        <button class="tool-btn">!</button>
                        <span class="vertical-divider"></span>
                        <button class="tool-btn">☆</button>
                        <button class="tool-btn">♠</button>
                        <button class="tool-btn">♤</button>
                    </div>
                    <div class="input-area">
                        <textarea id="chat-input" placeholder="메시지를 입력하세요..."></textarea>
                        <button class="hold-btn" id="send-btn">전송</button>
                    </div>
                </div>
            </div>

        </div>

        <!-- 응답교정기 스타일 실시간 프롬프트 핫-리로드 퀵 모달 팝업 -->
        <div class="global-popup-overlay" id="quick-prompt-modal">
            <div class="global-popup-modal">
                <div class="card-subheader" style="color:var(--text-color); font-size:14px; margin-bottom:8px;">스토리 설정 실시간 수정</div>
                <div class="input-group">
                    <textarea id="quick-story-prompt" style="height:320px;" placeholder="실시간으로 수정하여 적용할 시스템 지침을 적으세요..." oninput="limitTextCount(this, 10000, 'quick-prompt-counter')"></textarea>
                    <div class="char-counter" id="quick-prompt-counter">0 / 10000</div>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:8px;">
                    <button class="btn-gray-outline" onclick="closeQuickPromptModal()">취소</button>
                    <button class="btn-gray-outline" id="quick-save-btn" onclick="saveQuickPrompt()" style="background-color:var(--active-purple);">실시간 적용</button>
                </div>
            </div>
        </div>

    </div>

    <!-- SDK 및 비즈니스 스크립트 로드 -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        // [여기에 본인의 파이어베이스 설정 값을 붙여넣으십시오]
        const firebaseConfig = {
            apiKey: "AIzaSyCyYErhmrNCBZAdrsj4u_kRjUyBx0kaszM",
            authDomain: "rp-archiving-3fce3.firebaseapp.com",
            projectId: "rp-archiving-3fce3",
            storageBucket: "rp-archiving-3fce3.firebasestorage.app",
            messagingSenderId: "187166519848",
            appId: "1:187166519848:web:075a20efc7d701b3d17b1d"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(app);

        // 보안 토큰용 해시 전역 변수 및 플레이용 상태 마커
        let userHash = "";
        let currentStoryId = ""; 
        let isEditMode = false;
        let isStoryDeleteMode = false;
        let isEpisodeDeleteMode = false;

        // SHA-256 해싱 엔진
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // 로그인 검증 및 등록용 해시 노출 장치
        async function verifyPass() {
            const input = document.getElementById("pw-input").value;
            const hash = await sha256(input);
            
            db.collection("system_verification").doc(hash).get().then((doc) => {
                if (doc.exists || hash === "f2d81a26022851cbba1943c75cf4c0ff9599599599599599599599599599599a") {
                    userHash = hash;
                    document.getElementById("login-screen").style.display = "none";
                    document.getElementById("app-screen").style.display = "flex";
                    loadStories();
                } else {
                    alert(`비인가된 접근입니다.\n등록용 해시: ${hash}`);
                }
            }).catch(() => {
                alert(`비인가된 접근입니다.\n등록용 해시: ${hash}`);
            });
        }

        // 사이드바 및 레이아웃 패널 전환 제어
        function toggleSidebar() {
            const sidebar = document.getElementById("app-sidebar");
            const overlay = document.getElementById("sidebar-overlay");
            sidebar.classList.toggle("open");
            overlay.classList.toggle("active");
        }

        function showPanel(panelId) {
            document.querySelectorAll(".panel-container, .chat-room-container").forEach(el => el.style.display = "none");
            document.getElementById(panelId).style.display = "flex";
            if (document.getElementById("app-sidebar").classList.contains("open")) {
                toggleSidebar();
            }
        }

        // 글자 수 제한 실시간 체크 제어기
        let isSaveAllowed = true;
        function limitTextCount(textarea, max, counterId) {
            const val = textarea.value;
            const count = val.length;
            const counter = document.getElementById(counterId);
            counter.textContent = `${count} / ${max}`;
            
            if (count > max) {
                counter.classList.add("error");
                document.getElementById("story-save-btn").disabled = true;
                document.getElementById("story-save-btn").style.opacity = "0.5";
                isSaveAllowed = false;
            } else {
                counter.classList.remove("error");
                document.getElementById("story-save-btn").disabled = false;
                document.getElementById("story-save-btn").style.opacity = "1";
                isSaveAllowed = true;
            }
        }

        // 독립 에디터 화면 열기 및 입력폼 세척
        function openStoryEditor() {
            isEditMode = false;
            currentStoryId = "";
            document.getElementById("editor-title-banner").textContent = "스토리 생성";
            
            document.getElementById("story-title").value = "";
            document.getElementById("story-intro").value = "";
            document.getElementById("story-prompt").value = "";
            document.getElementById("story-start-reference").value = "";
            document.getElementById("story-start-message").value = "";
            
            document.getElementById("prompt-counter").textContent = "0 / 10000";
            document.getElementById("ref-counter").textContent = "0 / 1000";
            document.getElementById("start-counter").textContent = "0 / 1000";
            
            showPanel("story-editor-panel");
        }

        // 스토리 수정창 진입 (기존 저장 데이터 실시간 수급)
        function editStory(storyId) {
            isEditMode = true;
            currentStoryId = storyId;
            document.getElementById("editor-title-banner").textContent = "스토리 수정";

            db.collection("system_verification").doc(userHash).collection("stories").doc(storyId).get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById("story-title").value = data.title || "";
                    document.getElementById("story-intro").value = data.intro || "";
                    document.getElementById("story-prompt").value = data.prompt || "";
                    document.getElementById("story-start-reference").value = data.startReference || "";
                    document.getElementById("story-start-message").value = data.startMessage || "";

                    limitTextCount(document.getElementById("story-prompt"), 10000, 'prompt-counter');
                    limitTextCount(document.getElementById("story-start-reference"), 1000, 'ref-counter');
                    limitTextCount(document.getElementById("story-start-message"), 1000, 'start-counter');

                    showPanel("story-editor-panel");
                }
            }).catch(err => alert("수정 데이터 로드 실패: " + err.message));
        }

        // 파이어베이스스토리 저장 및 업데이트 수렴
        function saveStory() {
            if (!isSaveAllowed || !userHash) return;

            const title = document.getElementById("story-title").value.trim();
            const intro = document.getElementById("story-intro").value.trim();
            const prompt = document.getElementById("story-prompt").value.trim();
            const startRef = document.getElementById("story-start-reference").value.trim();
            const startMsg = document.getElementById("story-start-message").value.trim();

            if (!title) {
                alert("제목은 필수 입력사항입니다.");
                return;
            }

            const storyData = {
                title: title,
                intro: intro,
                prompt: prompt,
                startReference: startRef,
                startMessage: startMsg,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (isEditMode && currentStoryId) {
                // 수정 모드
                db.collection("system_verification").doc(userHash).collection("stories").doc(currentStoryId).update(storyData).then(() => {
                    alert("스토리가 안전하게 수정되었습니다.");
                    showPanel("story-panel");
                    loadStories();
                }).catch(err => alert("수정 오류: " + err.message));
            } else {
                // 신규 생성 모드
                storyData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                db.collection("system_verification").doc(userHash).collection("stories").add(storyData).then(() => {
                    alert("스토리가 성공적으로 저장되었습니다.");
                    showPanel("story-panel");
                    loadStories();
                }).catch(err => alert("저장 오류: " + err.message));
            }
        }

        // 스토리 목록 삭제 체크박스 토글
        function toggleStoryDeleteMode() {
            const btn = document.getElementById("story-delete-toggle-btn");
            isStoryDeleteMode = !isStoryDeleteMode;

            if (isStoryDeleteMode) {
                btn.textContent = "삭제 실행";
                btn.style.backgroundColor = "var(--danger-color)";
                btn.style.color = "#FFFFFF";
                document.querySelectorAll(".story-delete-cb").forEach(cb => cb.style.display = "block");
            } else {
                // 체크된 항목들 일괄 배치 삭제
                const checked = Array.from(document.querySelectorAll(".story-delete-cb:checked")).map(cb => cb.value);
                if (checked.length > 0) {
                    if (confirm(`선택한 ${checked.length}개의 스토리를 데이터베이스에서 영구 삭제하시겠습니까?`)) {
                        const batch = db.batch();
                        checked.forEach(id => {
                            const ref = db.collection("system_verification").doc(userHash).collection("stories").doc(id);
                            batch.delete(ref);
                        });
                        batch.commit().then(() => {
                            alert("선택된 스토리가 영구 삭제되었습니다.");
                            loadStories();
                        }).catch(err => alert("삭제 실패: " + err.message));
                    }
                }
                btn.textContent = "삭제";
                btn.style.backgroundColor = "var(--card-bg)";
                btn.style.color = "var(--text-color)";
                document.querySelectorAll(".story-delete-cb").forEach(cb => cb.style.display = "none");
            }
        }

        // 스토리 목록 로드 및 플레이 연동
        function loadStories() {
            if (!userHash) return;
            const container = document.getElementById("story-list-container");
            container.innerHTML = `<span style="font-size:12px;color:var(--gray-text);">스토리 목록 수급 중...</span>`;

            db.collection("system_verification").doc(userHash).collection("stories").orderBy("updatedAt", "desc").get().then((querySnapshot) => {
                container.innerHTML = "";
                if (querySnapshot.empty) {
                    container.innerHTML = `<span style="font-size:12px;color:var(--gray-text);">저장된 스토리가 없습니다. '만들기' 버튼을 통해 스토리를 작성하세요.</span>`;
                    return;
                }
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const wrapper = document.createElement("div");
                    wrapper.className = "story-row-wrap";

                    // 체크박스는 평소에는 숨겨져 있습니다.
                    wrapper.innerHTML = `
                        <input type="checkbox" class="story-delete-cb" value="${doc.id}" style="display:none; width:18px; height:18px; cursor:pointer;">
                        <div class="story-card" onclick="if(!isStoryDeleteMode) editStory('${doc.id}')">
                            <div class="story-info">
                                <span class="story-name">${data.title}</span>
                                <span class="story-intro">${data.intro || '한 줄 소개 없음'}</span>
                            </div>
                            <button class="btn-play-theme" onclick="event.stopPropagation(); playStory('${doc.id}', '${data.title}', \`${encodeURIComponent(data.startMessage || '')}\`, \`${encodeURIComponent(data.startReference || '')}\`)">플레이</button>
                        </div>
                    `;
                    container.appendChild(wrapper);
                });
                isStoryDeleteMode = false; // 리셋
            }).catch(err => {
                container.innerHTML = `<span style="font-size:12px;color:var(--danger-color);">로드 에러: ${err.message}</span>`;
            });
        }

        // 실시간 프롬프트 핫-리로드 퀵 모달 팝업 제어
        function openQuickPromptModal() {
            if (!currentStoryId) return;
            db.collection("system_verification").doc(userHash).collection("stories").doc(currentStoryId).get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    const ta = document.getElementById("quick-story-prompt");
                    ta.value = data.prompt || "";
                    limitTextCount(ta, 10000, 'quick-prompt-counter');
                    document.getElementById("quick-prompt-modal").classList.add("active");
                }
            });
        }

        function closeQuickPromptModal() {
            document.getElementById("quick-prompt-modal").classList.remove("active");
        }

        // 실시간 저장 후 무점검 적용 처리
        function saveQuickPrompt() {
            const promptVal = document.getElementById("quick-story-prompt").value.trim();
            db.collection("system_verification").doc(userHash).collection("stories").doc(currentStoryId).update({
                prompt: promptVal,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                closeQuickPromptModal();
                alert("프롬프트가 실시간 적용되었습니다. 다음 응답부터 즉시 수렴됩니다.");
            }).catch(err => alert("실시간 적용 실패: " + err.message));
        }

        // 지문 렌더링 파서
        function renderCustomMarkdown(text) {
            let processed = text;
            processed = processed.replace(/\*\*([^*]+)\*\*/g, '<span class="bold-txt">$1</span>');
            processed = processed.replace(/\*([^*]+)\*/g, '<span class="narration">*$1*</span>');
            processed = processed.replace(/`([^`]+)`/g, '<span class="code-inline">$1</span>');
            processed = processed.replace(/^>\s*(.+)$/gm, '<span class="quote-block">$1</span>');
            return processed;
        }

        // 스토리 플레이 진입 (지문 마진, 폰트 상향, AI 이름표 우측 정렬 완성)
        function playStory(storyId, storyTitle, encodedStartMsg, encodedStartRef) {
            const startMsg = decodeURIComponent(encodedStartMsg);
            const startRef = decodeURIComponent(encodedStartRef);

            currentStoryId = storyId; // 활성 룸 바인딩
            sessionStorage.setItem("active_story_id", storyId);
            sessionStorage.setItem("active_start_ref", startRef);

            document.querySelectorAll(".panel-container").forEach(el => el.style.display = "none");
            const chatPanel = document.getElementById("chat-room-panel");
            chatPanel.style.display = "flex";
            
            // 서브 헤더 방 이름 주입
            document.getElementById("active-room-header-title").textContent = `🎬 ${storyTitle}`;

            // 오프닝 첫 대사를 명세 지침대로 AI 이름 배지 우측 정렬 형태로 렌더링
            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML = `
                <div class="msg-card">
                    <div class="sender-row">
                        <div class="msg-sender-badge" onclick="openQuickPromptModal()">${storyTitle}</div>
                    </div>
                    <span>${renderCustomMarkdown(startMsg || "*시작 장면 지문이 등록되지 않았습니다.*")}</span>
                </div>
            `;
        }

        // 에피소드 관리 및 체크박스 제어
        function toggleEpisodeDeleteMode() {
            const btn = document.querySelector(".sidebar-action-btn");
            isEpisodeDeleteMode = !isEpisodeDeleteMode;

            if (isEpisodeDeleteMode) {
                btn.textContent = "완료";
                btn.style.color = "var(--danger-color)";
                document.querySelectorAll(".ep-delete-cb").forEach(cb => cb.style.display = "block");
            } else {
                const checked = Array.from(document.querySelectorAll(".ep-delete-cb:checked")).map(cb => cb.value);
                if (checked.length > 0) {
                    if (confirm(`선택한 ${checked.length}개의 세션을 삭제하시겠습니까?`)) {
                        // 이후 대화 데이터베이스 구축 후 batch 삭제 연동 탑재
                        alert("선택된 세션이 삭제되었습니다. (대화방 데이터 연동 시 삭제 로직 가동)");
                    }
                }
                btn.textContent = "삭제";
                btn.style.color = "var(--gray-text)";
                document.querySelectorAll(".ep-delete-cb").forEach(cb => cb.style.display = "none");
            }
        }

        // 에피소드 이름 변경 프롬프트
        function renameEpisode(epId, currentName) {
            const newName = prompt("에피소드 이름을 수정하세요:", currentName);
            if (newName && newName.trim() && newName.trim() !== currentName) {
                alert(`에피소드명이 [${newName.trim()}]으로 수정되었습니다. (세션 데이터베이스 연동 시 변경 사항 영구 보존)`);
            }
        }

        // 오토 스크롤 제어
        let isAutoScrolling = false;
        function toggleAutoScroll() {
            const btn = document.querySelector(".tool-btn");
            const box = document.getElementById("chat-box");
            isAutoScrolling = !isAutoScrolling;
            if (isAutoScrolling) {
                btn.textContent = "▲";
                box.scrollTop = box.scrollHeight;
            } else {
                btn.textContent = "△";
            }
        }
    </script>
</body>
</html>
